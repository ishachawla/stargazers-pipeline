version: 2

sources:
  - name: github_raw
    schema: github_raw
    tables :
      - name: stargazers
        description: "Raw stargazers loaded by dlt from GitHub API"
        freshness:
          warn_after: {count: 25, period: hour}   # warn if older than 25hrs
          error_after: {count: 49, period: hour}  # error if older than 49hrs
        loaded_at_field: starred_at      
